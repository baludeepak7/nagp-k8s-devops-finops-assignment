      ('Keyboard', 'Accessories', 1500.00),
      ('Monitor', 'Electronics', 12000.00),
      ('Desk Chair', 'Furniture', 8500.00),
      ('Notebook', 'Stationery', 120.00),
      ('Water Bottle', 'Lifestyle', 600.00),
      ('Backpack', 'Travel', 2500.00);
