apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: nagp
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS products (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      category VARCHAR(100) NOT NULL,
      price NUMERIC(10,2) NOT NULL
    );

    INSERT INTO products (name, category, price) VALUES
